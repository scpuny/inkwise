# InkWise 墨智 — GitHub Release Workflow
# 基于 Git Tag 自动构建全平台安装包并发布
#
# 触发方式: git tag v1.0.0 && git push origin v1.0.0
#
# 构建产物:
#   macOS ARM64  → InkWise_*.dmg (M-chip)
#   macOS x86_64 → InkWise_*.dmg (Intel，在 ARM runner 上交叉编译)
#   Linux x86_64 → InkWise_*_amd64.deb / .AppImage
#   Linux ARM64  → InkWise_*_arm64.deb / .AppImage (QEMU 模拟)
#   Windows      → InkWise_*.msi / .exe

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: InkWise

jobs:
  # ──────────────────────────────────────────────
  # 1. 原生构建：macOS (ARM + Intel) / Linux x86_64 / Windows x86_64
  # ──────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            target: universal
            architecture: universal

          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: amd64

          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      # ── macOS: 构建双架构 ──
      - name: Build Tauri (macOS ARM64)
        if: matrix.name == 'macos'
        run: npx tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri (macOS Intel x86_64)
        if: matrix.name == 'macos'
        run: npx tauri build --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── 非 macOS: 单架构构建 ──
      - name: Build Tauri application
        if: matrix.name != 'macos'
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── 上传 macOS ARM64 ──
      - name: Upload macOS ARM64 artifacts
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/
          if-no-files-found: error

      # ── 上传 macOS Intel ──
      - name: Upload macOS Intel artifacts
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/
          if-no-files-found: error

      # ── 上传其他平台 ──
      - name: Upload build artifacts
        if: matrix.name != 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 2. Linux ARM64 (原生交叉编译，无需 QEMU)
  # ──────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup multiarch and install cross-deps
        run: |
          # 只将标准 Ubuntu 源固定为 amd64（避免误改 microsoft-prod.list 等第三方源）
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list 2>/dev/null || true
          for f in /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] || continue
            grep -l 'archive.ubuntu.com\|security.ubuntu.com' "$f" 2>/dev/null &&               sudo sed -i 's/^deb /deb [arch=amd64] /' "$f" || true
          done
          # 添加 arm64 架构支持
          sudo dpkg --add-architecture arm64
          # 添加 ARM64 专用源（ports.ubuntu.com）
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe restricted multiverse' | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe restricted multiverse' | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-backports main universe restricted multiverse' | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          echo 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe restricted multiverse' | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update -q
          sudo apt-get install -y -q \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            pkg-config-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64 \
            libsoup-3.0-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Set cross-compilation environment
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri for ARM64
        run: npx tauri build --target aarch64-unknown-linux-gnu

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-arm64
          path: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 3. 创建 GitHub Release（合并全平台产物）
  # ──────────────────────────────────────────────
  create-release:
    needs: [build-native, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find release-artifacts -type f -exec ls -lh {} \;
          echo "========================"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.APP_NAME }} ${{ github.ref_name }}
          body: |
            ## InkWise ${{ github.ref_name }}

            请根据您的系统选择对应安装包下载。

            | 平台 | 架构 | 格式 |
            |---|---|---|
            | macOS | Apple Silicon (M芯片) | .dmg |
            | macOS | Intel | .dmg |
            | Linux | x86_64 | .deb / .AppImage |
            | Linux | ARM64 | .deb / .AppImage |
            | Windows | x86_64 | .msi / .exe |

            完整更新日志见下方。
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: false
