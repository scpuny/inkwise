name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: InkWise

jobs:
  # ---- Native builds: macOS / Linux x86_64 / Windows ----
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (macOS ARM64)
        if: matrix.name == 'macos'
        run: npx tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri (macOS Intel)
        if: matrix.name == 'macos'
        run: npx tauri build --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri
        if: matrix.name != 'macos'
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS ARM64
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/

      - name: Upload macOS Intel
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-x64
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/

      - name: Upload other artifacts
        if: matrix.name != 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/

  # ---- Linux ARM64: build in native ARM64 Docker container via QEMU ----
  build-linux-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # QEMU Rust compilation is slow

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64/v8 \
            -v ${{ github.workspace }}:/workspace:rw \
            -w /workspace \
            -e CARGO_BUILD_JOBS=2 \
            arm64v8/ubuntu:22.04 \
            bash -c "
              set -e
              echo '=== Install system deps ==='
              apt-get update -qq
              apt-get install -y -qq \
                curl build-essential pkg-config \
                libwebkit2gtk-4.1-dev libgtk-3-dev \
                libayatana-appindicator3-dev librsvg2-dev patchelf \
                libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

              echo '=== Install Node.js ==='
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y -qq nodejs

              echo '=== Install Rust ==='
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              . \"\$HOME/.cargo/env\"
              rustup target add aarch64-unknown-linux-gnu

              echo '=== Build ==='
              cd /workspace
              npm ci
              npx tauri build --target aarch64-unknown-linux-gnu
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-arm64
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/

  # ---- Create GitHub Release ----
  create-release:
    needs: [build-native, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find release-artifacts -type f -exec ls -lh {} \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.APP_NAME }} ${{ github.ref_name }}
          body: |
            ## InkWise ${{ github.ref_name }}

            | Platform | Architecture | Format |
            |---|---|---|
            | macOS | Apple Silicon | .dmg |
            | macOS | Intel | .dmg |
            | Linux | x86_64 | .deb / .AppImage |
            | Linux | ARM64 | .deb / .AppImage |
            | Windows | x86_64 | .msi / .exe |
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: false
