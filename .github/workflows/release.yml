# InkWise 墨智 — GitHub Release Workflow
# 基于 Git Tag 自动构建全平台安装包并发布
#
# 触发方式: git tag v0.1.0 && git push origin v0.1.0
#
# 构建产物:
#   macOS ARM64  → InkWise_*.dmg (M-chip)
#   macOS x86_64 → InkWise_*.dmg (Intel)
#   Linux x86_64 → InkWise_*_amd64.deb / .AppImage
#   Linux ARM64  → InkWise_*_arm64.deb / .AppImage
#   Windows      → InkWise_*.msi / .exe

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: InkWise

jobs:
  # ──────────────────────────────────────────────
  # 1. 原生构建：macOS ARM64 / macOS Intel / Linux x86_64 / Windows x86_64
  # ──────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64

          - name: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
            architecture: x64

          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: amd64

          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 2. Linux ARM64 交叉构建
  #    通过 QEMU 模拟 ARM64 环境运行原生构建
  # ──────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build in ARM64 emulated environment
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          workdir: /github/workspace
          run: |
            # ── System dependencies ──
            apt-get update -q
            apt-get install -y -q \
              curl build-essential pkg-config \
              libwebkit2gtk-4.1-dev libgtk-3-dev \
              libayatana-appindicator3-dev librsvg2-dev \
              patchelf libssl-dev libsoup-3.0-dev \
              libjavascriptcoregtk-4.1-dev

            # ── Node.js 20 ──
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs

            # ── Rust ──
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . "$HOME/.cargo/env"
            rustup target add aarch64-unknown-linux-gnu

            # ── Build ──
            npm ci
            npx tauri build --target aarch64-unknown-linux-gnu

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-arm64
          path: |
            /github/workspace/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/

  # ──────────────────────────────────────────────
  # 3. 创建 GitHub Release（合并全平台产物）
  # ──────────────────────────────────────────────
  create-release:
    needs: [build-native, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find release-artifacts -type f -exec ls -lh {} \;
          echo "========================"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.APP_NAME }} ${{ github.ref_name }}
          body: |
            ## InkWise ${{ github.ref_name }}

            请根据您的系统选择对应安装包下载。

            | 平台 | 架构 | 格式 |
            |---|---|---|
            | macOS | Apple Silicon (M芯片) | .dmg |
            | macOS | Intel | .dmg |
            | Linux | x86_64 | .deb / .AppImage |
            | Linux | ARM64 | .deb / .AppImage |
            | Windows | x86_64 | .msi / .exe |

            完整更新日志见下方。
          generate_release_notes: true
          files: release-artifacts/*
          fail_on_unmatched_files: false
