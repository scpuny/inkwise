<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkWise — Write with Wisdom</title>
  <style>
    /* ── Splash base (defaults to dark) ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
      opacity: 1;
      pointer-events: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0b0d0f;
      color: #e8eaed;
    }
    #splash.splash--hidden {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 64px;
      height: 64px;
      filter: drop-shadow(0 0 24px rgba(217, 119, 87, 0.25));
    }
    #splash h1 {
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0.3px;
      margin: 0;
      background: linear-gradient(135deg, #e8eaed 40%, #d97757);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #splash .splash__loader {
      display: flex;
      gap: 5px;
      margin-top: 4px;
    }
    #splash .splash__loader span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d97757;
      animation: splash-bounce 1.2s ease-in-out infinite;
    }
    #splash .splash__loader span:nth-child(2) { animation-delay: 0.16s; }
    #splash .splash__loader span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes splash-bounce {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
      40% { transform: scale(1); opacity: 0.9; }
    }

    /* ── Light theme overrides ── */
    [data-theme="light"] #splash {
      background: #f7f6f3;
      color: #1c1a17;
    }
    [data-theme="light"] #splash img {
      filter: drop-shadow(0 0 24px rgba(201, 107, 74, 0.2));
    }
    [data-theme="light"] #splash h1 {
      background: linear-gradient(135deg, #1c1a17 40%, #c96b4a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    [data-theme="light"] #splash .splash__loader span {
      background: #c96b4a;
    }
  </style>
</head>
<body>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("aiwriter-theme");
        var style = localStorage.getItem("aiwriter-theme-style");
        var resolved, s;
        if (theme === "light" || theme === "dark") { resolved = theme; }
        else if (theme === "auto" || !theme) {
          resolved = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        } else { resolved = "dark"; }
        s = style || "graphite";
        document.documentElement.setAttribute("data-theme", resolved);
        document.documentElement.setAttribute("data-theme-style", s);
      } catch (e) {}
    })();
  </script>
  <div id="splash">
    <img src="/inkwise-icon.svg" alt="InkWise" width="64" height="64" />
    <h1>InkWise · 墨智</h1>
    <div class="splash__loader" aria-label="加载中">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
